<style>
  :root{--bg:#f3f4f6; --card:#ffffff; --accent:#0ea5a4; --green:#16a34a; --red:#dc2626;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px 12px;}
  .card{width:min(900px,96vw);background:var(--card);border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,0.12);padding:24px;}
  .head{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  h1{ margin:0 0 4px 0;font-size:20px; }
  .question{font-size:18px;margin:16px 0;min-height:40px;line-height:1.45}
  .options{display:flex;flex-direction:column;gap:8px}
  .option{padding:10px 12px;border-radius:10px;border:1px solid #e6e6e6;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;line-height:1.4}
  .option .optline{display:flex;gap:10px;align-items:flex-start}
  .optletter{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:#eef2f7;color:#111;font-weight:700;font-size:13px;display:inline-flex;align-items:center;justify-content:center;margin-top:1px}
  .option.disabled{opacity:0.7;cursor:default}
  .option.correct{background:rgba(22,163,74,0.12);border-color:rgba(22,163,74,0.4)}
  .option.correct .optletter{background:var(--green);color:#fff}
  .option.wrong{background:rgba(220,38,38,0.06);border-color:rgba(220,38,38,0.35)}
  .option.wrong .optletter{background:var(--red);color:#fff}
  .controls{display:flex;gap:12px;margin-top:18px;align-items:center;flex-wrap:wrap}
  button{padding:10px 14px;border-radius:10px;border:none;background:var(--accent);color:white;cursor:pointer;font-weight:600;font-size:14px}
  button:disabled{opacity:0.5;cursor:default}
  button.secondary{background:#e6e6e6;color:#111}
  .feedback{font-weight:700;font-size:14px}
  .status{margin-left:auto;color:#374151;font-size:14px;font-weight:600}
  .visual{height:6px;background:#e5e7eb;border-radius:999px;margin-top:12px;overflow:hidden}
  .small{font-size:13px;color:#6b7280}
  .incnote{font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:6px 10px;margin:0 0 8px 0;display:inline-block}
  /* reference data tables */
  .refwrap{margin:10px 0 14px 0}
  .refToggle{background:#111;color:#fff;font-size:13px;padding:8px 12px;border-radius:8px}
  .refContent{margin-top:10px;overflow-x:auto}
  table.ref{border-collapse:collapse;width:100%;font-size:12.5px;margin-bottom:14px;min-width:340px}
  table.ref th,table.ref td{border:1px solid #e2e8f0;padding:4px 8px;text-align:left}
  table.ref th{background:#f1f5f9;font-weight:700}
  table.ref .ttl{background:#0ea5a4;color:#fff;text-align:center;font-size:13px}
  table.ref .sec{background:#334155;color:#fff;font-weight:700;text-align:center}
  table.ref .nr{text-align:center;color:#64748b;width:42px}
  table.ref .sp{}
  table.ref .v{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  @media(max-width:520px){ .status{margin-left:0} }
  .back-link{display:inline-block;margin-bottom:14px;text-decoration:none;color:#6b7280;font-weight:600;font-size:14px}
  .back-link:hover{color:var(--accent)}
</style>

<script>
/* ===== Motor quiz — folosește `grile` și `resurse` definite mai sus ===== */
(function(){
  "use strict";

  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#0ea5a4';

  function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  let order = [];      // întrebările în ordine random pentru runda curentă
  let idx = 0;
  let score = 0;
  let current = null;       // întrebarea curentă
  let correctText = '';     // textul răspunsului corect
  let selectedEl = null;
  let quizAreaTemplate = null;   // structura originală a zonei de quiz (pt. reluare)

  const $ = id => document.getElementById(id);

  function attachControls(){
    $('submitBtn').addEventListener('click', submit);
    $('nextBtn').addEventListener('click', nextQuestion);
  }

  function startQuiz(){
    if(quizAreaTemplate === null){
      quizAreaTemplate = $('quizArea').innerHTML;   // salvează structura o singură dată
    } else {
      $('quizArea').innerHTML = quizAreaTemplate;    // reconstruiește zona după un test terminat
    }
    attachControls();
    order = shuffle(grile.slice());     // ordine random a întrebărilor, de fiecare dată
    idx = 0;
    score = 0;
    selectedEl = null;
    $('qcount').textContent = 'Total grile: ' + order.length;
    renderQuestion();
  }

  function renderRef(res){
    const box = $('refBox');
    if(!res || !resurse[res]){ box.innerHTML = ''; return; }
    const data = resurse[res];
    box.innerHTML =
      '<div class="refwrap">' +
        '<button type="button" class="refToggle">Date pentru calcul: ' + data.titlu + ' — apasă pentru a afișa</button>' +
        '<div class="refContent" style="display:none">' + data.html + '</div>' +
      '</div>';
    const btn = box.querySelector('.refToggle');
    const content = box.querySelector('.refContent');
    btn.addEventListener('click', function(){
      const show = content.style.display === 'none';
      content.style.display = show ? 'block' : 'none';
      btn.textContent = (show ? 'Ascunde datele: ' : 'Date pentru calcul: ') + data.titlu + (show ? '' : ' — apasă pentru a afișa');
    });
  }

  function renderQuestion(){
    if(idx >= order.length){ finish(); return; }
    current = order[idx];
    correctText = current.options[current.correct];
    const opts = shuffle(current.options.slice());   // ordinea răspunsurilor random de fiecare dată

    selectedEl = null;
    $('qnum').textContent = 'Întrebarea ' + (idx + 1) + ' / ' + order.length + '  (ID #' + current.id + ')';

    renderRef(current.resource);

    const q = $('question');
    q.innerHTML = '';
    if(current.incomplete){
      const note = document.createElement('div');
      note.className = 'incnote';
      note.textContent = 'Grilă incompletă — în sursă a fost notat doar răspunsul corect.';
      q.appendChild(note);
    }
    const qt = document.createElement('div');
    qt.textContent = current.question;
    q.appendChild(qt);

    const optionsDiv = $('options');
    optionsDiv.innerHTML = '';
    opts.forEach(function(opt, i){
      const el = document.createElement('div');
      el.className = 'option';
      const line = document.createElement('span');
      line.className = 'optline';
      const letter = document.createElement('span');
      letter.className = 'optletter';
      letter.textContent = String.fromCharCode(65 + i);
      const text = document.createElement('span');
      text.className = 'opttext';
      text.textContent = opt;
      line.appendChild(letter);
      line.appendChild(text);
      el.appendChild(line);
      el.addEventListener('click', function(){ selectOption(el); });
      optionsDiv.appendChild(el);
    });

    $('feedback').textContent = '';
    $('submitBtn').disabled = false;
    $('submitBtn').style.display = 'inline-block';
    $('nextBtn').style.display = 'none';
    $('nextBtn').textContent = (idx + 1 >= order.length) ? 'Vezi rezultatul →' : 'Următoarea →';
    updateProgress(false);
  }

  function selectOption(el){
    if(el.classList.contains('disabled')) return;
    document.querySelectorAll('.option').forEach(function(o){ o.style.boxShadow = 'none'; });
    selectedEl = el;
    el.style.boxShadow = 'inset 0 0 0 2px ' + accent;
  }

  function submit(){
    if(!selectedEl){ alert('Selectează un răspuns mai întâi.'); return; }
    const chosen = selectedEl.querySelector('.opttext').textContent.trim();
    document.querySelectorAll('.option').forEach(function(o){
      o.classList.add('disabled');
      o.style.boxShadow = 'none';
    });
    const correctTrim = correctText.trim();
    if(chosen === correctTrim){
      selectedEl.classList.add('correct');
      $('feedback').textContent = 'Corect ✓';
      $('feedback').style.color = 'var(--green)';
      score += 1;
    } else {
      selectedEl.classList.add('wrong');
      const correctEl = Array.from(document.querySelectorAll('.option'))
        .find(function(o){ return o.querySelector('.opttext').textContent.trim() === correctTrim; });
      if(correctEl) correctEl.classList.add('correct');
      $('feedback').textContent = 'Greșit ✗';
      $('feedback').style.color = 'var(--red)';
    }
    $('score').textContent = 'Scor: ' + score + ' / ' + (idx + 1);
    $('submitBtn').disabled = true;
    $('nextBtn').style.display = 'inline-block';
    updateProgress(true);
  }

  function nextQuestion(){
    idx += 1;
    renderQuestion();
  }

  function updateProgress(answered){
    const done = answered ? (idx + 1) : idx;
    const ratio = done === 0 ? 0 : (idx + (answered ? 1 : 0)) / order.length;
    $('visualBar').style.width = (ratio * 100) + '%';
    if(done === 0){
      $('progressText').textContent = 'Răspunde pentru a începe';
    } else {
      const acc = score / done * 100;
      $('progressText').textContent = 'Rezolvate ' + done + ' / ' + order.length + ' — Acuratețe ' + acc.toFixed(0) + '%';
    }
  }

  function finish(){
    const pct = order.length ? (score / order.length * 100).toFixed(0) : 0;
    $('visualBar').style.width = '100%';
    $('progressText').textContent = 'Terminat!';
    $('quizArea').innerHTML =
      '<h2 style="margin-top:18px">Test terminat! </h2>' +
      '<p style="font-size:18px">Scor final: <strong>' + score + ' / ' + order.length + '</strong> (' + pct + '%)</p>' +
      '<button id="restartBtn">↺ Reia testul (altă ordine)</button>';
    $('restartBtn').addEventListener('click', startQuiz);
  }

  startQuiz();
})();
</script>
</body>
</html>
